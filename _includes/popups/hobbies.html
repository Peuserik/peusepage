<div class="popup-overlay retro-window" id="popup-hobbies" role="dialog" aria-modal="true">
  <div class="retro-win__outer">
    <div class="retro-win__titlebar">
      <span class="retro-win__icon">🎯</span>
      <span class="retro-win__title">HOBBIES &amp; PERSONAL</span>
      <div class="retro-win__controls">
        <button class="retro-btn retro-btn--min" data-close="popup-hobbies">_</button>
        <button class="retro-btn retro-btn--max">□</button>
        <button class="retro-btn retro-btn--close" data-close="popup-hobbies">✕</button>
      </div>
    </div>
    <div class="retro-win__body">
      <div class="hobbies-grid">
        {% assign hobby_classes = "gaming,homeauto,electronics,travel,photo,music" | split: "," %}
        {% for hobby in site.data.config.hobbies %}
          {% assign css_class = hobby_classes[forloop.index0] %}
          <div class="hobby-tile hobby-tile--{{ css_class }}">
            <span class="hobby-tile__icon">{{ hobby.icon }}</span>
            <span class="hobby-tile__label"
              data-label-en="{{ hobby.label_en }}"
              data-label-de="{{ hobby.label_de }}">{{ hobby.label_en }}</span>
          </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
