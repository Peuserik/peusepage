<div class="popup-overlay" id="popup-pinboard" role="dialog" aria-modal="true" aria-label="Updates">
  <div class="popup-window popup-window--pinboard">
    <button class="popup-close" data-close="popup-pinboard" aria-label="Close">✕</button>
    <h2 class="popup-title" data-i18n="popup_pinboard">Updates</h2>
    <div class="pinboard-sections">
      <section class="pinboard-section">
        <h3 data-i18n="currently_working_on">Currently working on</h3>
        <ul>
          {% for item in site.data.config.pinboard.currently_working_on %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </section>
      <section class="pinboard-section">
        <h3 data-i18n="latest_events">Latest events</h3>
        <ul>
          {% for item in site.data.config.pinboard.latest_events %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </section>
    </div>
  </div>
</div>
