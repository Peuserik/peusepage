title: peusepage
description: Personal portfolio
baseurl: "/peusepage"  # repo subpath — set to "" once custom domain is active
url: "https://peuserik.github.io"  # TODO: replace with your custom domain once configured

# Build settings
markdown: kramdown
theme: null
# No extra plugins required — github-pages gem includes everything needed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules

# Sass — partials live in _sass/ (Jekyll default)
sass:
  style: compressed
